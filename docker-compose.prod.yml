version: "3.8"

services:
  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: provigil-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: provigil-backend
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      - ./model/exported:/app/model/exported
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/provigil.db
      - MQTT_BROKER_HOST=mosquitto
      - MODEL_PATH=/app/model/exported/anomaly_model.pkl
      - SCALER_PATH=/app/model/exported/scaler.pkl
    depends_on:
      - mosquitto
    restart: unless-stopped

  # React Dashboard (production — static build served by Nginx)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.prod
    container_name: provigil-dashboard
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: provigil-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      - backend
      - dashboard
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
